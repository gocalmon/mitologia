<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuestionario de Mitología Griega</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; max-width: 650px; width: 100%; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .score-display { font-size: 1.3rem; font-weight: bold; color: #2980b9; background: #e1f5fe; padding: 8px 15px; border-radius: 10px; }
        .question-block { display: none; }
        .question-block.active { display: block; animation: fadeIn 0.4s; }
        .q-text { font-size: 1.15rem; font-weight: 600; color: #2c3e50; margin-bottom: 20px; line-height: 1.4; }
        .options-list { display: flex; flex-direction: column; gap: 12px; }
        .opt-btn { padding: 14px; border: 2px solid #bdc3c7; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; font-size: 1rem; transition: 0.2s; }
        .opt-btn:hover:not(:disabled) { border-color: #3498db; background: #f0f8ff; }
        .opt-btn:disabled { cursor: default; }
        /* Estados de respuesta */
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; font-weight: bold; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        
        .navigation { display: flex; justify-content: space-between; margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 6px; background: #3498db; color: white; font-weight: bold; cursor: pointer; }
        .nav-btn:disabled { background: #ccc; cursor: not-allowed; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.4rem;">🏛️ Dossier Mitológico</h2>
        <div class="score-display">Puntos: <span id="pts">0</span></div>
    </div>

    <div id="game-area"></div>

    <div class="navigation">
        <button class="nav-btn" id="prev" onclick="move(-1)">Anterior</button>
        <button class="nav-btn" id="next" onclick="move(1)">Siguiente</button>
    </div>
</div>

<script>
    const data = [
        { q: "¿En qué tres figuras centrales se divide la estirpe de los protagonistas de los mitos?", a: ["Titanes, Dioses y Monstruos.", "Dioses todopoderosos, héroes de corazón valiente y personas abocadas a la desgracia.", "Reyes sabios, ninfas del bosque y guerreros inmortales.", "Inventores geniales, animales mágicos y dioses del Olimpo."], c: 1 },
        { q: "¿A qué raza pertenece Prometeo, engendrada antes que los propios dioses?", a: ["A los Gigantes.", "A los Cíclopes.", "A los Titanes.", "A los Semidioses."], c: 2 },
        { q: "¿Qué utilizó Prometeo para ocultar los huesos del buey y engañar a Zeus?", a: ["Piel de animal vieja.", "Grasa apetitosa.", "Barro y arcilla.", "Una tela tejida por Aracne."], c: 1 },
        { q: "¿De qué material específico modeló Hefesto el cuerpo de Pandora?", a: ["Oro puro.", "Madera de olivo.", "Arcilla.", "Cera y plumas."], c: 2 },
        { q: "¿Cuál de estos males se menciona específicamente que escapó de la caja de Pandora?", a: ["La pereza.", "El odio furibundo.", "La guerra.", "La ceguera."], c: 1 },
        { q: "¿En qué tipo de personas se convertían las piedras lanzadas por Pirra?", a: ["Hombres robustos.", "Niños pequeños.", "Personas delgadas (mujeres).", "Ancianos sabios."], c: 2 },
        { q: "¿A quién suplicó ayuda la ninfa Dafne antes de transformarse en laurel?", a: ["A la diosa Atenea.", "A su padre, el río Peneo.", "Al dios Eros.", "A la diosa Temis."], c: 1 },
        { q: "¿Qué utilizó Atenea para transformar a Aracne en una araña?", a: ["Un rayo de Zeus.", "Una lanzadera de cerámica.", "El jugo de una hierba mágica.", "Hilos de seda encantados."], c: 2 },
        { q: "¿En qué se transformaban las lágrimas del rey Midas debido a su desolación?", a: ["Pepitas de plata.", "Rosas de cristal.", "Guijarros de oro.", "Gotas de fuego."], c: 2 },
        { q: "¿Cuántas cabezas tenía la Hidra de Lerna a la que se enfrentó Hércules?", a: ["7 cabezas.", "9 cabezas.", "50 cabezas.", "100 cabezas."], c: 2 },
        { q: "¿Cómo logró Perseo cortar la cabeza de Medusa sin convertirse en piedra?", a: ["Cerrando los ojos por completo.", "Mirando solo su reflejo en el escudo de bronce.", "Usando el casco de invisibilidad.", "Usando una venda mágica."], c: 1 },
        { q: "¿De qué material era el hilo que Ariadna entregó a Teseo?", a: ["Lana de oveja.", "Hilo de seda.", "Alambre de bronce.", "Hilo de oro."], c: 1 },
        { q: "¿Cuál es la enseñanza clave sobre Edipo al resolver el enigma?", a: ["La fuerza es superior a la inteligencia.", "Conocerse a sí mismo es la clave para no ser tu propio enemigo.", "El destino nunca puede ser cambiado.", "La curiosidad es un defecto mortal."], c: 1 },
        { q: "¿En qué animal se metamorfoseó Zeus para raptar a la joven Europa?", a: ["Un águila real.", "Un cisne blanco.", "Un toro blanco y dócil.", "Un caballo alado."], c: 2 },
        { q: "¿Qué advertencia dio Dédalo a su hijo Ícaro antes de volar?", a: ["No volara cerca del mar por la humedad.", "La necesidad de la prudencia (no volar cerca del sol).", "Vigilar el ataque de los pájaros.", "No mirar hacia atrás."], c: 1 },
        { q: "¿Qué instrumento utilizó Orfeo para amansar a las fieras?", a: ["Una flauta de pan.", "Una cítara.", "Una trompeta de plata.", "Un laúd de madera."], c: 1 },
        { q: "¿A quién iba destinado originalmente el caballo de madera como ofrenda?", a: ["A Poseidón.", "A Zeus.", "A Atenea.", "A Afrodita."], c: 2 },
        { q: "¿Cómo se define el término 'Vaticinio'?", a: ["Falta de respeto a lo sagrado.", "Pieza de cerámica del telar.", "Profecía o anuncio de un hecho futuro.", "Soldado que vigila un lugar."], c: 2 }
    ];

    let current = 0;
    let points = 0;
    let states = new Array(data.length).fill(null);

    function build() {
        const container = document.getElementById('game-area');
        data.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `question-block ${i === 0 ? 'active' : ''}`;
            div.id = `block-${i}`;
            div.innerHTML = `
                <p style="color:#7f8c8d; font-size:0.9rem; margin-bottom:5px;">Pregunta ${i+1} de ${data.length}</p>
                <div class="q-text">${item.q}</div>
                <div class="options-list">
                    ${item.a.map((opt, idx) => `<button class="opt-btn" id="opt-${i}-${idx}" onclick="check(${i}, ${idx})">${opt}</button>`).join('')}
                </div>
            `;
            container.appendChild(div);
        });
        refreshNav();
    }

    window.check = function(qIdx, choice) {
        if (states[qIdx] !== null) return;
        
        states[qIdx] = choice;
        const correct = data[qIdx].c;
        if (choice === correct) {
            points += 5;
        } else {
            points -= 5;
        }
        document.getElementById('pts').innerText = points;
        updateButtons(qIdx, choice, correct);
    };

    function updateButtons(qIdx, choice, correct) {
        data[qIdx].a.forEach((_, i) => {
            const btn = document.getElementById(`opt-${qIdx}-${i}`);
            btn.disabled = true;
            if (i === correct) btn.classList.add('correct');
            else if (i === choice) btn.classList.add('wrong');
        });
    }

    window.move = function(dir) {
        document.getElementById(`block-${current}`).classList.remove('active');
        current += dir;
        if (current >= data.length) {
            alert("¡Cuestionario finalizado! Puntuación final: " + points);
            current = data.length - 1;
        }
        document.getElementById(`block-${current}`).classList.add('active');
        refreshNav();
    };

    function refreshNav() {
        document.getElementById('prev').disabled = current === 0;
        document.getElementById('next').innerText = current === data.length - 1 ? "Finalizar" : "Siguiente";
    }

    build();
</script>
</body>
</html>
