<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trivia Mitología con Reporte Final</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        #quiz-container { background: white; max-width: 650px; width: 100%; padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid #3498db; margin-bottom: 20px; padding-bottom: 10px; }
        .score-display { font-size: 1.2rem; font-weight: bold; color: #2980b9; background: #e1f5fe; padding: 8px 15px; border-radius: 10px; }
        .question-block { display: none; }
        .question-block.active { display: block; animation: fadeIn 0.4s; }
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: #2c3e50; }
        .options-list { display: flex; flex-direction: column; gap: 10px; }
        .opt-btn { padding: 12px; border: 2px solid #bdc3c7; border-radius: 8px; background: #fff; cursor: pointer; text-align: left; }
        .opt-btn:disabled { cursor: default; }
        .correct { background-color: #d4edda !important; border-color: #28a745 !important; }
        .wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; }
        .navigation { display: flex; justify-content: space-between; margin-top: 25px; padding-top: 15px; border-top: 1px solid #eee; }
        .nav-btn { padding: 10px 20px; border: none; border-radius: 6px; background: #3498db; color: white; cursor: pointer; font-weight: bold; }
        .nav-btn:disabled { background: #ccc; }
        
        /* Estilos Reporte Final */
        #final-report { display: none; }
        .report-item { margin-bottom: 15px; padding: 10px; border-radius: 8px; border-left: 5px solid #ccc; background: #f9f9f9; font-size: 0.9rem; }
        .report-item.hit { border-left-color: #28a745; }
        .report-item.miss { border-left-color: #dc3545; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="quiz-container">
    <div id="quiz-game">
        <div class="header">
            <h2 style="margin:0">🏛️ Desafío Mitológico</h2>
            <div class="score-display">Puntos: <span id="pts">0</span></div>
        </div>
        <div id="game-area"></div>
        <div class="navigation">
            <button class="nav-btn" id="prev" onclick="move(-1)">Anterior</button>
            <button class="nav-btn" id="next" onclick="move(1)">Siguiente</button>
        </div>
    </div>

    <!-- Pantalla Final -->
    <div id="final-report">
        <h2 style="text-align:center">Resumen del Desafío</h2>
        <div class="score-display" style="text-align:center; margin-bottom:20px;">Puntuación Final: <span id="final-pts">0</span></div>
        <div id="report-list"></div>
        <button class="nav-btn" style="width:100%; margin-top:20px;" onclick="location.reload()">Reiniciar Juego</button>
    </div>
</div>

<script>
    const data = [
        { q: "¿En qué tres figuras se divide la estirpe de los protagonistas?", a: ["Titanes, Dioses y Monstruos.", "Dioses todopoderosos, héroes y personas abocadas a la desgracia.", "Reyes sabios, ninfas y guerreros.", "Inventores, animales y dioses."], c: 1 },
        { q: "¿A qué raza pertenece Prometeo?", a: ["Gigantes.", "Cíclopes.", "Titanes.", "Semidioses."], c: 2 },
        { q: "¿Qué ocultó Prometeo para engañar a Zeus?", a: ["Piel vieja.", "Grasa apetitosa.", "Barro.", "Tela de Aracne."], c: 1 },
        { q: "¿De qué material modeló Hefesto a Pandora?", a: ["Oro.", "Madera.", "Arcilla.", "Cera."], c: 2 },
        { q: "¿Qué mal escapó de la caja de Pandora?", a: ["Pereza.", "Odio furibundo.", "Guerra.", "Ceguera."], c: 1 },
        { q: "¿En qué se convertían las piedras de Pirra?", a: ["Hombres.", "Niños.", "Mujeres.", "Ancianos."], c: 2 },
        { q: "¿A quién suplicó ayuda Dafne?", a: ["Atenea.", "Al río Peneo.", "Eros.", "Temis."], c: 1 },
        { q: "¿Qué usó Atenea para transformar a Aracne?", a: ["Rayo.", "Lanzadera.", "Hierba mágica.", "Seda."], c: 2 },
        { q: "¿En qué se transformaban las lágrimas de Midas?", a: ["Plata.", "Cristal.", "Guijarros de oro.", "Fuego."], c: 2 },
        { q: "¿Cuántas cabezas tenía la Hidra?", a: ["7.", "9.", "50.", "100."], c: 2 },
        { q: "¿Cómo miró Perseo a Medusa?", a: ["Cerrando ojos.", "Reflejo en escudo.", "Invisibilidad.", "Venda."], c: 1 },
        { q: "¿De qué era el hilo de Ariadna?", a: ["Lana.", "Seda.", "Bronce.", "Oro."], c: 1 },
        { q: "¿Enseñanza de Edipo?", a: ["Fuerza > Inteligencia.", "Conocerse a sí mismo.", "Destino fijo.", "Curiosidad mala."], c: 1 },
        { q: "¿Animal de Zeus para raptar a Europa?", a: ["Águila.", "Cisne.", "Toro blanco.", "Pegaso."], c: 2 },
        { q: "¿Advertencia de Dédalo a Ícaro?", a: ["Humedad mar.", "Prudencia (sol).", "Pájaros.", "No mirar atrás."], c: 1 },
        { q: "¿Instrumento de Orfeo?", a: ["Flauta.", "Cítara.", "Trompeta.", "Laúd."], c: 1 },
        { q: "¿Ofrenda del caballo de Troya?", a: ["Poseidón.", "Zeus.", "Atenea.", "Afrodita."], c: 2 },
        { q: "¿Definición de Vaticinio?", a: ["Falta respeto.", "Cerámica.", "Profecía.", "Soldado."], c: 2 }
    ];

    let current = 0, points = 0;
    let states = new Array(data.length).fill(null);

    function build() {
        const area = document.getElementById('game-area');
        data.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = `question-block ${i === 0 ? 'active' : ''}`;
            div.id = `block-${i}`;
            div.innerHTML = `<div class="q-text">${i+1}. ${item.q}</div><div class="options-list">
                ${item.a.map((opt, idx) => `<button class="opt-btn" id="opt-${i}-${idx}" onclick="check(${i}, ${idx})">${opt}</button>`).join('')}
            </div>`;
            area.appendChild(div);
        });
        updateNav();
    }

    window.check = (q, choice) => {
        if (states[q] !== null) return;
        states[q] = choice;
        const correct = data[q].c;
        points += (choice === correct) ? 5 : -5;
        document.getElementById('pts').innerText = points;
        data[q].a.forEach((_, i) => {
            const b = document.getElementById(`opt-${q}-${i}`);
            b.disabled = true;
            if (i === correct) b.classList.add('correct');
            else if (i === choice) b.classList.add('wrong');
        });
    };

    window.move = (dir) => {
        if (current + dir >= data.length) { showReport(); return; }
        document.getElementById(`block-${current}`).classList.remove('active');
        current += dir;
        document.getElementById(`block-${current}`).classList.add('active');
        updateNav();
    };

    function updateNav() {
        document.getElementById('prev').disabled = current === 0;
        document.getElementById('next').innerText = current === data.length - 1 ? "Finalizar" : "Siguiente";
    }

    function showReport() {
        document.getElementById('quiz-game').style.display = 'none';
        document.getElementById('final-report').style.display = 'block';
        document.getElementById('final-pts').innerText = points;
        const list = document.getElementById('report-list');
        data.forEach((item, i) => {
            const isHit = states[i] === item.c;
            list.innerHTML += `<div class="report-item ${isHit ? 'hit' : 'miss'}">
                <strong>${i+1}. ${item.q}</strong><br>
                ${isHit ? '✅ Acertaste' : '❌ Fallaste'}. Respuesta correcta: <em>${item.a[item.c]}</em>
            </div>`;
        });
    }

    build();
</script>
</body>
</html>
